  musicCutterHelp: |
    Sekarang beri tahu aku <b>bagian musik mana</b> yang ingin kamu potong?

    Durasi berkas adalah <code>{length}</code> detik.

    <b>Pola yang valid:</b>
    <code>mm:ss-mm:ss</code>
    misalnya <code>00:10-02:30</code>

    <code>ss-ss</code>
    misalnya <code>75-120</code>

    <b>Catatan:</b>
    - m = menit, s = detik
    - Angka nol di depan bersifat opsional
    - Spasi berlebih akan diabaikan
    - Hanya angka Inggris yang valid
  fromTo: |
    <b>Dari</b>: {fromSecond}
    <b>Sampai</b>: {toSecond}
  bitrateChangerHelp: |
    Sekarang beri tahu aku bitrate yang kamu inginkan untuk berkasmu.
    Kamu bisa memilih bitrate yang diinginkan dari menu di bawah ini.
