  musicCutterHelp: |
    Ahora dime <b>qué parte de la música</b> deseas cortar.

    La duración del archivo es <code>{length}</code> segundos.

    <b>Formatos válidos:</b>
    <code>mm:ss-mm:ss</code>  
    Ejemplo: <code>00:10-02:30</code>

    <code>ss-ss</code>  
    Ejemplo: <code>75-120</code>

    <b>Notas:</b>
    - m = minutos, s = segundos
    - Los ceros iniciales son opcionales
    - Los espacios extra se ignoran
    - Solo se aceptan números en formato internacional
