ar:
  startMessage: |
    مرحبًا! 👋
    لنبدأ الآن. فقط أرسل لي مقطعًا موسيقيًا وشاهد مدى روعتي!
  chooseLanguage: "الرجاء اختيار اللغة:"
  startOverMessage: أرسل لي مقطعًا موسيقيًا وشاهد مدى روعتي!
  helpMessage: |
    الأمر سهل جدًا! فقط أرسل لي أو قم بإعادة توجيه ملف صوتي، أو ملف MP3، أو أي مقطع موسيقي. أنا في الانتظار... 😁

    بالمناسبة، إذا واجهت مشكلة أثناء معالجة الملف، قم بإدخال الأمر /new للبدء من جديد.
  aboutMessage: |
    تم إنشاء هذا البوت بواسطة @amirhoseinsalimi باستخدام لغة Python.
    يمكنك العثور على الكود المصدري للمشروع على <a href="https://github.com/amirhoseinsalimi/music-tool-bot">GitHub</a>.
    الإصدار: {version}

    إذا كان لديك أي سؤال أو ملاحظة، فلا تتردد في مراسلتي على Telegram.
    وإذا كنت مطورًا ولديك فكرة لتحسين البوت، فأرحّب بطلبات السحب (Pull Requests) الخاصة بك.
  defaultMessage: "أرسل لي أو قم بإعادة توجيه ملف صوتي، أو ملف MP3، أو أي مقطع موسيقي. أنا في الانتظار... 😁"
