  musicCutterHelp: |
    الآن أرسل لي <b>الجزء الذي ترغب بقصّه من الموسيقى</b>؟

    مدة الملف هي <code>{length}</code> ثانية.

    <b>الصيغ الصحيحة:</b>
    <code>mm:ss-mm:ss</code>
    مثال: <code>00:10-02:30</code>

    <code>ss-ss</code>
    مثال: <code>75-120</code>

    <b>ملاحظات:</b>
    - m = دقيقة، s = ثانية
    - الأصفار في البداية اختيارية
    - يتم تجاهل المسافات الإضافية
    - يُقبل فقط إدخال الأرقام الإنجليزية
  fromTo: |
    <b>من</b>: {fromSecond}
    <b>إلى</b>: {toSecond}
  bitrateChangerHelp: |
    الآن أخبرني بمعدل البت الذي ترغب باستخدامه للملف.
    يمكنك اختيار معدل البت المناسب من القائمة أدناه.
  donationMessage: |
