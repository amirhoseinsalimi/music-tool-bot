  musicCutterHelp: |
    Теперь отправь <b>какую часть музыки</b> ты хочешь вырезать?

    Длина файла — <code>{length}</code> секунд.

    <b>Допустимые форматы:</b>
    <code>mm:ss-mm:ss</code>
    Например: <code>00:10-02:30</code>

    <code>ss-ss</code>
    Например: <code>75-120</code>

    <b>Примечания:</b>
    - m = минуты, s = секунды
    - Ведущие нули необязательны
    - Лишние пробелы игнорируются
    - Допустимы только арабские (международные) цифры
  fromTo: |
