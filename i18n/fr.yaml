  musicCutterHelp: |
    Dis-moi <b>quelle partie de la musique</b> tu veux découper ?

    La durée du fichier est de <code>{length}</code> secondes.

    <b>Formats valides :</b>
    <code>mm:ss-mm:ss</code>
    Exemple : <code>00:10-02:30</code>

    <code>ss-ss</code>
    Exemple : <code>75-120</code>

    <b>Notes :</b>
    - m = minute, s = seconde
    - Les zéros initiaux sont optionnels
    - Les espaces supplémentaires sont ignorés
    - Seuls les chiffres internationaux sont acceptés
