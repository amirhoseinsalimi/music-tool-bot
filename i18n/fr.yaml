fr:
  startMessage: |
    Bonjour ! 👋
    Commençons. Envoie-moi simplement de la musique et tu verras à quel point je suis génial !
  chooseLanguage: "Merci de choisir une langue :"
  startOverMessage: Envoie-moi de la musique et tu verras à quel point je suis génial !
  helpMessage: |
    C’est très simple ! Envoie-moi ou transfère-moi une piste audio, un fichier MP3 ou de la musique. J’attends… 😁

    Au passage, si tu rencontres un problème lors du traitement du fichier, utilise la commande /new pour recommencer.
  aboutMessage: |
    Ce bot a été créé par @amirhoseinsalimi en utilisant Python.
    Le code source de ce projet est disponible sur <a href="https://github.com/amirhoseinsalimi/music-tool-bot">GitHub</a>.
    Version : {version}

    Si tu as des questions ou des retours, n’hésite pas à m’écrire sur Telegram.
    Si tu es développeur et que tu as une idée pour améliorer le bot, j’accueille volontiers tes pull requests.
