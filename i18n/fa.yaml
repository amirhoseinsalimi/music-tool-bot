  musicCutterHelp: |
    حالا بگو <b>کجای موزیک</b> رو می‌خوای ببُریم؟

    مدت فایل <code>{length}</code> ثانیه‌ست.

    <b>فرمت‌های درست:</b>
    <code>mm:ss-mm:ss</code>
    مثل: <code>00:10-02:30</code>

    <code>ss-ss</code>
    مثل: <code>75-120</code>

    <b>نکته‌ها:</b>
    - m = دقیقه، s = ثانیه
    - صفرهای اول رو خواستی بذار، نخواستی هم اوکیه
    - فاصله اضافه مشکلی نداره
    - فقط عددهای انگلیسی قابل قبولن
