hi:
  startMessage: |
    नमस्ते! 👋
    चलिए शुरू करते हैं। बस मुझे कोई म्यूज़िक भेजिए और देखिए मैं कितना कमाल का हूँ!
  chooseLanguage: "कृपया एक भाषा चुनें:"
