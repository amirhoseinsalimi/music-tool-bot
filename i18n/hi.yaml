  helpMessage: |
    बहुत आसान है! बस मुझे कोई ऑडियो ट्रैक, MP3 फ़ाइल या म्यूज़िक भेजिए या फ़ॉरवर्ड कीजिए। मैं इंतज़ार कर रहा हूँ… 😁

    वैसे, अगर आपकी फ़ाइल प्रोसेस करने में कोई दिक़्क़त आ रही है, तो दोबारा शुरू करने के लिए /new कमांड भेजिए।
  aboutMessage: |
    यह बॉट @amirhoseinsalimi ने Python से बनाया है।
    इस प्रोजेक्ट का सोर्स कोड <a href="https://github.com/amirhoseinsalimi/music-tool-bot">GitHub</a> पर उपलब्ध है।
    वर्ज़न: {version}

    अगर आपके कोई सवाल या सुझाव हों, तो मुझे Telegram पर बेझिझक संदेश भेजिए।
    अगर आप डेवलपर हैं और इस बॉट को बेहतर बनाने के विचार रखते हैं, तो आपके पुल रिक्वेस्ट का स्वागत है।
