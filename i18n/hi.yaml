  musicCutterHelp: |
    अब मुझे बताइए कि आप म्यूज़िक का <b>कौन सा हिस्सा</b> काटना चाहते हैं?

    फ़ाइल की अवधि <code>{length}</code> सेकंड है।

    <b>मान्य पैटर्न:</b>
    <code>mm:ss-mm:ss</code>
    जैसे <code>00:10-02:30</code>

    <code>ss-ss</code>
    जैसे <code>75-120</code>

    <b>ध्यान दें:</b>
    - m = मिनट, s = सेकंड
    - शुरुआती शून्य वैकल्पिक हैं
    - अतिरिक्त स्पेस अनदेखे कर दिए जाते हैं
    - केवल अंग्रेज़ी अंक मान्य हैं
  fromTo: |
    <b>से</b>: {fromSecond}
    <b>तक</b>: {toSecond}
  bitrateChangerHelp: |
    अब मुझे बताइए कि आप अपनी फ़ाइल किस बिटरेट पर चाहते हैं।
    आप नीचे दिए गए मेनू से अपना मनचाहा बिटरेट चुन सकते हैं।
  donationMessage: |
