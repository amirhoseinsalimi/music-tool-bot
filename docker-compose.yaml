name: music-tool-bot

services:
  postgres:
    image: postgres:16-alpine
    container_name: music-tool-bot-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-music_tool_bot_dev}
      POSTGRES_USER: ${DB_USERNAME:-music_tool_bot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-music_tool_bot_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-music_tool_bot} -d ${DB_DATABASE:-music_tool_bot_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bot:
    image: music-tool-bot:prod
    container_name: music-tool-bot-bot
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      START_CMD: python bot.py
      PTB_TIMEDELTA: True
      DATA_DIR: ${DATA_DIR:-/data}
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bot_data:/data
    restart: unless-stopped

volumes:
  bot_data:
  postgres_data:
